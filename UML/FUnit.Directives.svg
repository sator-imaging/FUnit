@startuml
skinparam BackgroundColor F9F9F9
skinparam shadowing false
skinparam RoundCorner 7
skinparam ArrowColor 191919
skinparam FontColor 191919
skinparam SequenceLifeLineBorderColor 393939
skinparam SequenceGroupHeaderFontColor 191919
skinparam SequenceGroupFontColor 393939
skinparam SequenceGroupBorderColor 393939
skinparam SequenceGroupBorderThickness 1

skinparam sequenceDivider {
    BorderColor 191919
    BorderThickness 1
    FontColor 191919
}

skinparam participant {
    BackgroundColor E55756
    BorderColor 191919
    FontColor F9F9F9
    BorderThickness 1.5
}

skinparam database {
    BackgroundColor A4DBD8
    BorderColor 191919
    FontColor 191919
}

skinparam entity {
    BackgroundColor EFBABC
    BorderColor 191919
    FontColor 191919
}

skinparam note {
    BackgroundColor e5e5e5
    BorderColor 191919
    FontColor 191919
    BorderThickness 1.5
}

skinparam actor {
    BackgroundColor 191919
    BorderColor 191919
    FontColor 191919
}

skinparam boundary {
    BackgroundColor EFBABC
    BorderColor 191919
    FontColor 191919
}

skinparam control {
    BackgroundColor EFBABC
    BorderColor 191919
    FontColor 191919
}

skinparam collections {
    BackgroundColor E55756
    BorderColor 191919
    FontColor 191919
    BorderThickness 1.5
}

skinparam queue {
    BackgroundColor E55756
    BorderColor 191919
    FontColor FFF
    BorderThickness 1.5
}

skinparam class {
    BackgroundColor F1F1F1
    BorderColor BBBBBB
}
left to right direction
class SR {
    + <<const>> DirectivePrefix : string = "funit"
    + <<const>> DiagnosticCategory : string
}
SR o-> "MissingFileNameDiagnostic" DiagnosticDescriptor
SR o-> "IncludedFileNotFoundDiagnostic" DiagnosticDescriptor
SR o-> "UnknownFUnitDirectiveDiagnostic" DiagnosticDescriptor
SR o-> "EmptyFUnitDirectiveDiagnostic" DiagnosticDescriptor
SR o-> "FileExtensionNotSupportedDiagnostic" DiagnosticDescriptor
SR o-> "DebugDiagnostic" DiagnosticDescriptor
class FUnitSourceGenerator {
    + FUnitSourceGenerator()
    + Initialize(context:GeneratorInitializationContext) : void
    + Execute(context:GeneratorExecutionContext) : void
}
ISourceGenerator <|- - FUnitSourceGenerator
interface IDirectiveOperator {
}
class IncludeOperator {
    + DirectiveKeyword : string <<get>>
    + Setup() : void
    + Cleanup() : void
    + Apply(args:string, sourceFilePath:string, location:Location) : (string HintName, string? GeneratedCode, ImmutableList<Diagnostic> Diagnostics)
}
IDirectiveOperator <|- - IncludeOperator
@enduml

